# Full stack: frontend + api + postgres + redis. Brings everything up with:
#   docker compose up --build
# Then open the UI at http://localhost:8080 (it proxies /ask and /health to the api service).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: markets
      POSTGRES_PASSWORD: markets
      POSTGRES_DB: markets
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U markets"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    # Secrets (GROQ_API_KEY, etc.) come from backend/.env; service URLs are overridden below
    # to point at the compose network rather than localhost.
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://markets:markets@postgres:5432/markets
      REDIS_URL: redis://redis:6379/0
      CHROMA_PERSIST_DIR: /app/data/chroma
    ports:
      - "8000:8000"
    volumes:
      # Persist the ChromaDB store across container restarts.
      - ./backend/data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  pgdata:
