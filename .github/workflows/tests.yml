name: tests

# Fast, hermetic unit tests for the backend. Needs no secrets and makes no live LLM/network
# calls (a dummy GROQ_API_KEY is injected in tests/conftest.py), so it runs on every push/PR,
# including from forks. Also type-checks the frontend.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Run unit tests
        working-directory: backend
        run: python -m pytest tests -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci || npm install
      - name: Type-check and build
        working-directory: frontend
        run: npm run build
