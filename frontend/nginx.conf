# Serves the built SPA and reverse-proxies API calls to the backend `api` service so the
# browser sees a single origin (no CORS needed in the compose network).
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback: unknown routes return index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy API endpoints to the FastAPI service.
  location ~ ^/(ask|health)$ {
    proxy_pass http://api:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 120s;
  }
}
